<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>重定向中...</title>
    <script>
        (function() {
            var path = window.location.pathname;
            var hash = window.location.hash;
            
            // 构建重定向URL：传递原始路径给 index.html
            var redirectUrl = '/?from=' + encodeURIComponent(path.replace(/^\//, '').replace(/\.html$/, ''));
            if (hash) {
                redirectUrl += hash;
            }
            
            window.location.replace(redirectUrl);
        })();
    </script>
</head>
<body>
    <p>正在重定向...</p>
</body>
</html>
