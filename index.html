<body>
    <!-- URL 路由修复：当服务器直接返回 index.html 但 URL 不是 / 时，
         自动重定向到 ?from=<page>#<hash>，确保 SPA 能加载正确页面 -->
    <script>
    (function() {
        var path = window.location.pathname;
        var hash = window.location.hash;
        var params = new URLSearchParams(window.location.search);
        if (params.get('from') || params.get('redirect')) return;
        var clean = path.replace(/^\/|\/$/g, '').replace(/\.html$/, '');
        if (!clean || clean === 'index') return;
        var validPages = ['home','tech','projects','blogs','tools','donate','about'];
        var page = clean.replace(/\/.*/, '');
        if (validPages.indexOf(page) !== -1) {
            var url = '/?from=' + page;
            if (hash) url += hash;
            window.location.replace(url);
        }
    })();
    </script>
