    <!-- 引入 markdown 解析库 -->
    <script src="./js/markdown-it.min.js"></script>

    <script>
        const md = window.markdownit({
            html: true,
            linkify: true,
            typographer: true,
            highlight: function (str, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    try {
                        return '<pre class="hljs"><code>' +
                            hljs.highlight(str, { language: lang, ignoreIllegals: true }).value +
                            '</code></pre>';
                    } catch (__) { }
                }
                return '<pre class="hljs"><code>' + md.utils.escapeHtml(str) + '</code></pre>';
            }
        });

        let blogData = [];
        let filteredBlogs = [];
        let currentFilter = 'all';
        let searchQuery = '';

        // 防抖函数
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // 简单的 HTML 转义，防止 XSS
        function escapeHtml(str) {
            if (str == null) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        // 把标题文本转成 URL 友好的 slug（用于生成稳定 id）
        function slugify(text) {
            return String(text || '')
                .trim()
                .toLowerCase()
                .replace(/[\s\u3000]+/g, '-')
                .replace(/[^\w\u4e00-\u9fa5-]/g, '')
                .replace(/-+/g, '-')
                .replace(/^-|-$/g, '') || 'section';
        }

        // 点赞数据存储（使用 localStorage 缓存）
        const likeStorage = {
            getKey: (id) => `blog_like_${id}`,
            hasLiked: (id) => localStorage.getItem(likeStorage.getKey(id)) === 'true',
            setLiked: (id, liked) => localStorage.setItem(likeStorage.getKey(id), liked.toString()),
            getCount: (id) => {
                const data = localStorage.getItem(`blog_like_count_${id}`);
                return data ? parseInt(data, 10) : 0;
            },
            setCount: (id, count) => localStorage.setItem(`blog_like_count_${id}`, count.toString())
        };

        document.addEventListener('DOMContentLoaded', () => {
            // 列表视图的全局滚动监听（仅注册一次）
            setupGlobalScrollHandlers();
            // 鼠标侧键返回监听（仅注册一次）
            setupMouseBackButton();

            loadBlogsSequentially().then(() => {
                // 博客列表渲染完成后，保存初始页面结构（用于返回列表功能）
                const container = document.getElementById('container');
                if (container) {
                    initialPageHTML = container.innerHTML;
                }
                // 检查 URL hash 是否指向某篇博客
                checkHashAndOpenBlog();
            });

            // 监听 hashchange 事件（浏览器前进/后退）
            window.addEventListener('hashchange', () => {
                if (isHashNavigating) return; // 代码主动触发的变更，忽略
                const hash = location.hash.slice(1);
                if (hash && blogData.find(b => b.id === hash)) {
                    // hash 指向某篇博客，打开详情
                    if (!isInDetailMode) {
                        openBlogDetail(hash, true);
                    } else if (isInDetailMode && !isOpeningBlog) {
                        // 从一篇博客切换到另一篇（用户直接修改 URL hash）
                        openBlogDetail(hash, true);
                    }
                } else if (!hash && isInDetailMode) {
                    // hash 被清空（浏览器后退），返回列表
                    window.scrollTo(0, 0);
                    renderBlogList();
                    isInDetailMode = false;
                    // 恢复原始 meta 标签
                    updateMetaTag('og:title', '技术博客文章 - QinIndexCode');
                    updateMetaTag('og:description', '分享 JavaScript、前端开发、后端开发等技术文章');
                    updateMetaTag('og:url', 'https://qinindexcode.site/blogs.html');
                    updateNameMetaTag('twitter:title', '技术博客文章 - QinIndexCode');
                    updateNameMetaTag('twitter:description', '分享 JavaScript、前端开发、后端开发等技术文章');
                    document.title = '技术博客文章 - QinIndexCode | 前端开发、后端开发、全栈开发';
                }
            });

            // 窗口大小变化时，如果从移动端切到桌面端，自动关闭目录面板
            window.addEventListener('resize', () => {
                if (window.innerWidth > 900) {
                    closeMobileToc();
                }
            });

            // Escape 键关闭移动端目录面板
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    closeMobileToc();
                }
            });

            // 监听父页面的 hash 同步消息（主页面 popstate 触发时）
            window.addEventListener('message', (e) => {
                const data = e.data;
                if (!data || typeof data !== 'object') return;
                if (data.type === 'qinblog-hash-sync') {
                    const newHash = (data.hash || '').slice(1);
                    const currentHash = location.hash.slice(1);
                    if (newHash !== currentHash) {
                        if (newHash && blogData.find(b => b.id === newHash)) {
                            openBlogDetail(newHash, true);
                        } else if (!newHash && isInDetailMode) {
                            window.scrollTo(0, 0);
                            renderBlogList();
                            isInDetailMode = false;
                            updateMetaTag('og:title', '技术博客文章 - QinIndexCode');
                            updateMetaTag('og:description', '分享 JavaScript、前端开发、后端开发等技术文章');
                            updateMetaTag('og:url', 'https://qinindexcode.site/blogs.html');
                            updateNameMetaTag('twitter:title', '技术博客文章 - QinIndexCode');
                            updateNameMetaTag('twitter:description', '分享 JavaScript、前端开发、后端开发等技术文章');
                            document.title = '技术博客文章 - QinIndexCode | 前端开发、后端开发、全栈开发';
                        }
                    }
                }
            });
        });

        // 检查 URL hash 并打开对应博客（用于刷新后恢复）
        function checkHashAndOpenBlog() {
            const hash = location.hash.slice(1);
            if (hash && blogData.find(b => b.id === hash)) {
                openBlogDetail(hash, true);
            }
        }

        async function loadBlogsSequentially() {
            const blogListElement = document.getElementById('blog-list');
            blogListElement.innerHTML = '<div class="loading">正在加载文章…</div>';

            const loadedBlogs = [];
            let index = 1;
            let consecutiveErrors = 0;

            while (true) {
                const num = String(index).padStart(3, '0');
                const fileName = num + '.md';
                const filePath = './blogs/' + fileName;

                try {
                    const res = await fetch(filePath);
                    if (!res.ok) break; // 404 or other error = no more articles
                    const content = await res.text();
                    try {
                        loadedBlogs.push(parseBlogContent(fileName, content));
                    } catch (parseErr) {
                        console.error('Failed to parse', fileName, parseErr);
                        // Continue to next article, don't break
                    }
                } catch (e) {
                    // 网络错误时跳过当前文章，继续尝试下一篇
                    console.warn('Failed to fetch', fileName, e);
                    index++;
                    // 安全阀：连续 3 次网络错误则停止
                    consecutiveErrors++;
                    if (consecutiveErrors >= 3) break;
                    continue;
                }
                consecutiveErrors = 0; // 成功则重置错误计数
                index++;
            }

            if (loadedBlogs.length === 0) {
                blogListElement.innerHTML = '<div class="empty-state">暂无文章</div>';
                return;
            }

            blogData = loadedBlogs.sort((a, b) => b.seq - a.seq);
            filteredBlogs = [...blogData];

            renderBlogList();
            renderFilterTags();
            initSearchAndFilters();
            updateBlogJsonLd();
        }

        /* Dynamically generate JSON-LD structured data from parsed blog data.
           Replaces the static script so author info is pulled from each article's frontmatter. */
        function updateBlogJsonLd() {
            const scriptEl = document.getElementById('blog-jsonld');
            if (!scriptEl || !blogData || blogData.length === 0) return;

            const blogItems = blogData.map((blog, idx) => ({
                "@type": "ListItem",
                "position": idx + 1,
                "item": {
                    "@type": "BlogPosting",
                    "headline": blog.title,
                    "datePublished": blog.date,
                    "description": blog.excerpt.replace(/\.\.\.$/, ''),
                    "keywords": (blog.tags || []).join(", "),
                    "author": { "@type": "Person", "name": blog.author }
                }
            }));

            const jsonLd = {
                "@context": "https://schema.org",
                "@type": "Blog",
                "name": "QinIndexCode 技术博客",
                "description": "分享 JavaScript、前端开发、后端开发等技术文章",
                "url": "https://qinindexcode.site/blogs.html",
                "author": {
                    "@type": "Person",
                    "name": "QinIndexCode",
                    "url": "https://qinindexcode.site"
                },
                "publisher": {
                    "@type": "Person",
                    "name": "QinIndexCode",
                    "logo": {
                        "@type": "ImageObject",
                        "url": "https://qinindexcode.site/assets/images/avatar.jpg"
                    }
                },
                "blogPost": {
                    "@type": "ItemList",
                    "itemListElement": blogItems
                }
            };

            scriptEl.textContent = JSON.stringify(jsonLd, null, 4);
        }

        /* Parse YAML frontmatter from markdown content.
           Frontmatter is a block at the start of the file:
               ---
               author: Someone
               date: 2025-12-24
               title: Optional Title
               ---
           Returns { meta, body } where body has the frontmatter stripped. */
        function parseFrontmatter(raw) {
            const match = raw.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?/);
            if (!match) return { meta: {}, body: raw };

            const meta = {};
            match[1].split(/\r?\n/).forEach(line => {
                const m = line.match(/^([a-zA-Z_-]+)\s*:\s*(.*)$/);
                if (m) {
                    let v = m[2].trim();
                    // Strip surrounding quotes
                    if ((v.startsWith('"') && v.endsWith('"')) ||
                        (v.startsWith("'") && v.endsWith("'"))) {
                        v = v.slice(1, -1);
                    }
                    const key = m[1].toLowerCase();
                    // Parse comma-separated tags into array
                    if (key === 'tags') {
                        meta[key] = v.split(/,\s*/).map(t => t.trim()).filter(Boolean);
                    } else {
                        meta[key] = v;
                    }
                }
            });
            return { meta, body: raw.slice(match[0].length) };
        }

        function parseBlogContent(fileName, content) {
            const seq = parseInt(fileName.replace('.md', ''), 10);

            /* Parse optional frontmatter (author, date, title) from the
               top of the markdown. Falls back to scanning the body. */
            const { meta, body } = parseFrontmatter(content);

            let title = meta.title || 'Untitled';
            let date = meta.date || 'Unknown';
            const author = meta.author || '匿名';

            /* If title/date not in frontmatter, parse from the first
               `## YYYY-MM-DD Title` line in the body. */
            if (!meta.title || !meta.date) {
                const firstLineMatch = body.match(/^##\s+(\d{4}-\d{2}-\d{2})\s+(.*)$/m);
                if (firstLineMatch) {
                    if (!meta.date) date = firstLineMatch[1].trim();
                    if (!meta.title) title = firstLineMatch[2].trim();
                }
            }

            /* The content used for rendering and excerpting should have
               the frontmatter stripped. */
            const renderable = body;

            let plainText = renderable
                .replace(/^##.*$/gm, '')
                .replace(/```[\s\S]*?```/g, '')
                .replace(/!\[.*?\]\(.*?\)/g, '')
                .replace(/\n/g, ' ')
                .trim();

            const excerpt = plainText.length > 150
                ? plainText.substring(0, 150) + '...'
                : plainText || 'No summary';

            // Tags: prefer frontmatter tags, fallback to content extraction
            const tags = meta.tags && meta.tags.length > 0
                ? meta.tags.map(t => t.toLowerCase())
                : extractTags(renderable).map(t => t.replace('#', '').toLowerCase());

            return {
                id: fileName.replace('.md', ''),
                fileName: fileName,
                seq: seq,
                title: title,
                date: date,
                author: author,
                excerpt: excerpt,
                content: renderable,
                tags: tags
            };
        }

        // 估算字数
        function estimateWordCount(content) {
            const text = content.replace(/```[\s\S]*?```/g, '')
                .replace(/!\[.*?\]\(.*?\)/g, '')
                .trim();
            const chineseChars = (text.match(/[\u4e00-\u9fa5]/g) || []).length;
            const englishWords = (text.match(/[a-zA-Z]+/g) || []).length;
            return chineseChars + englishWords;
        }

        // ========== 搜索和过滤功能 ==========
        // 使用事件委托绑定到 #container，避免 innerHTML 替换后丢失监听
        let searchHandlersBound = false;
        function initSearchAndFilters() {
            if (searchHandlersBound) return;
            const container = document.getElementById('container');
            if (!container) return;
            searchHandlersBound = true;

            // 搜索输入（事件委托 + 防抖）
            const debouncedSearch = debounce(() => {
                const input = document.getElementById('search-input');
                if (!input) return;
                searchQuery = input.value.trim().toLowerCase();
                updateClearButton();
                filterAndSortBlogs();
            }, 200);

            container.addEventListener('input', (e) => {
                if (e.target && e.target.id === 'search-input') {
                    debouncedSearch();
                }
            });

            // 清除搜索、标签过滤、排序选择：都用 click/change 委托
            container.addEventListener('click', (e) => {
                // 清除搜索
                const clearBtn = e.target.closest('#clear-search');
                if (clearBtn) {
                    const input = document.getElementById('search-input');
                    if (input) {
                        input.value = '';
                        searchQuery = '';
                        updateClearButton();
                        filterAndSortBlogs();
                        input.focus();
                    }
                    return;
                }
                // 标签过滤
                const tag = e.target.closest('.filter-tag');
                if (tag && tag.dataset.filter) {
                    document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
                    tag.classList.add('active');
                    currentFilter = tag.dataset.filter;
                    filterAndSortBlogs();
                }
            });

            // Custom select dropdown logic
            initCustomSelect();
        }

        function initCustomSelect() {
            const wrapper = document.getElementById('sort-select-wrapper');
            const trigger = document.getElementById('sort-select-trigger');
            const dropdown = document.getElementById('sort-select-dropdown');
            const hiddenInput = document.getElementById('sort-select');
            const labelSpan = document.getElementById('sort-select-label');
            if (!wrapper || !dropdown) return;

            const options = dropdown.querySelectorAll('.custom-select__option');
            let isOpen = false;
            let currentIndex = 0;

            function open() {
                isOpen = true;
                wrapper.classList.add('open');
                wrapper.setAttribute('aria-expanded', 'true');
                // Scroll selected into view
                const selected = dropdown.querySelector('[aria-selected="true"]');
                if (selected) selected.scrollIntoView({ block: 'nearest' });
            }

            function close() {
                isOpen = false;
                wrapper.classList.remove('open');
                wrapper.setAttribute('aria-expanded', 'false');
            }

            function selectOption(option) {
                const value = option.dataset.value;
                const text = option.querySelector('span').textContent;
                // Update visual state
                options.forEach(opt => opt.setAttribute('aria-selected', 'false'));
                option.setAttribute('aria-selected', 'true');
                // Update trigger label
                labelSpan.textContent = text;
                // Update hidden input
                hiddenInput.value = value;
                // Trigger sort
                filterAndSortBlogs();
                close();
            }

            function selectByIndex(idx) {
                if (idx < 0) idx = 0;
                if (idx >= options.length) idx = options.length - 1;
                currentIndex = idx;
                selectOption(options[idx]);
            }

            // Click trigger to toggle
            trigger.addEventListener('click', (e) => {
                e.stopPropagation();
                isOpen ? close() : open();
            });

            // Click option to select
            dropdown.addEventListener('click', (e) => {
                const option = e.target.closest('.custom-select__option');
                if (option) {
                    e.stopPropagation();
                    selectOption(option);
                }
            });

            // Keyboard navigation
            wrapper.addEventListener('keydown', (e) => {
                if (!isOpen) {
                    if (e.key === 'Enter' || e.key === ' ' || e.key === 'ArrowDown') {
                        e.preventDefault();
                        open();
                        return;
                    }
                    return;
                }

                switch (e.key) {
                    case 'Escape':
                        e.preventDefault();
                        close();
                        trigger.focus();
                        break;
                    case 'ArrowDown':
                        e.preventDefault();
                        currentIndex = Math.min(currentIndex + 1, options.length - 1);
                        options[currentIndex].scrollIntoView({ block: 'nearest' });
                        break;
                    case 'ArrowUp':
                        e.preventDefault();
                        currentIndex = Math.max(currentIndex - 1, 0);
                        options[currentIndex].scrollIntoView({ block: 'nearest' });
                        break;
                    case 'Enter':
                    case ' ':
                        e.preventDefault();
                        selectByIndex(currentIndex);
                        trigger.focus();
                        break;
                    case 'Tab':
                        close();
                        break;
                }
            });

            // Close when clicking outside
            document.addEventListener('click', (e) => {
                if (!wrapper.contains(e.target)) close();
            });

            // Initialize current index from selected option
            options.forEach((opt, i) => {
                if (opt.getAttribute('aria-selected') === 'true') currentIndex = i;
            });
        }

        function updateClearButton() {
            const clearSearch = document.getElementById('clear-search');
            clearSearch.style.display = searchQuery ? 'flex' : 'none';
        }

        function filterAndSortBlogs() {
            const sortMode = document.getElementById('sort-select').value;

            // 过滤
            filteredBlogs = blogData.filter(blog => {
                // 搜索过滤
                const matchSearch = !searchQuery ||
                    blog.title.toLowerCase().includes(searchQuery) ||
                    blog.excerpt.toLowerCase().includes(searchQuery) ||
                    blog.content.toLowerCase().includes(searchQuery);

                // 标签过滤
                const matchFilter = currentFilter === 'all' ||
                    blog.tags?.includes(currentFilter);

                return matchSearch && matchFilter;
            });

            // 排序
            filteredBlogs.sort((a, b) => {
                switch (sortMode) {
                    case 'oldest':
                        return a.seq - b.seq;
                    case 'title':
                        return a.title.localeCompare(b.title, 'zh-CN');
                    case 'wordcount':
                        return estimateWordCount(b.content) - estimateWordCount(a.content);
                    case 'newest':
                    default:
                        return b.seq - a.seq;
                }
            });

            // 更新统计
            updateSearchStats();

            // 重新渲染
            renderBlogList();
        }

        function updateSearchStats() {
            const statsEl = document.getElementById('search-stats');
            const statsText = document.getElementById('stats-text');

                statsText.textContent = `找到 ${filteredBlogs.length} 篇相关文章（共 ${blogData.length} 篇）`;
            } else {
                statsEl.style.display = 'none';
            }

        // 提取标签
        function extractTags(content) {
            const tags = [];

            h2Matches.slice(0, 5).forEach(match => {
                const tag = match.replace(/^##\s+/, '').trim();
                if (tag.length < 10) {
                    tags.push('#' + tag.replace(/\s+/g, ''));

            });
            // 默认标签

            giscusThemeObservers = [];

        // 设置 Giscus 主题监听器（简化优化版）
        function setupGiscusThemeListener() {
            // 先清理之前的监听器，防止重复创建
            cleanupGiscusThemeListeners();

            let lastTheme = getCurrentTheme();

            // 统一方案：使用 postMessage 与父窗口通信
            if (window.parent !== window) {
                const themeChangeHandler = (e) => {
                    // 只处理来自父窗口的消息
                    if (e.source !== window.parent) return;

                    const newTheme = e.data?.giscus?.theme || e.detail?.theme;
                    if (newTheme && newTheme !== lastTheme) {
                        lastTheme = newTheme;
                        updateGiscusTheme(newTheme);
                    }
                };

                // 监听 CustomEvent
                window.parent.addEventListener('themeChanged', themeChangeHandler);
                giscusThemeListeners.push({
                    target: window.parent,
                    type: 'themeChanged',
                    handler: themeChangeHandler
                });

                // 监听 postMessage
                const messageHandler = (e) => {
                    if (e.source !== window.parent) return;
                    if (e.data?.type === 'themeChange') {
                        const newTheme = e.data.theme;
                        if (newTheme && newTheme !== lastTheme) {
                            lastTheme = newTheme;
                            updateGiscusTheme(newTheme);
                        }
                    }
                };
                window.addEventListener('message', messageHandler);
                giscusThemeListeners.push({
                    target: window,
                    type: 'message',
                    handler: messageHandler
                });
            }

            // 页面卸载时清理（使用 pagehide 替代废弃的 unload）
            window.addEventListener('pagehide', cleanupGiscusThemeListeners);

        // ========== 新增功能：目录生成 ==========

        // 给博客内容中的 heading 自动分配 id（markdown-it 默认不生成 id）
        function assignHeadingIds(container) {
            const headings = container.querySelectorAll('h1, h2, h3, h4, h5, h6');
            const counts = {};
            headings.forEach(h => {
                if (h.id) return; // 已有 id 则跳过
                let base = slugify(h.textContent);
                if (!base) base = 'section';
                const next = (counts[base] || 0) + 1;
                counts[base] = next;
                h.id = next === 1 ? base : `${base}-${next}`;
            });
        }

        // 生成稳定的 heading slug，确保重复标题也能得到唯一 id
        function buildHeadingIdMap(headings) {
            const counts = {};
            const map = new WeakMap();
            headings.forEach(h => {
                let base = slugify(h.textContent);
                if (!base) base = 'section';
                const next = (counts[base] || 0) + 1;
                counts[base] = next;
                const id = next === 1 ? base : `${base}-${next}`;
                h.id = id;
                map.set(h, id);
            });
            return map;
        }

        function generateTOC() {
            const tocList = document.getElementById('toc-list');
            const sidebar = document.getElementById('blog-sidebar');
            if (!tocList || !sidebar) return;

            const blogContent = document.getElementById('blog-content');
            if (!blogContent) return;

            // 解析 h1 - h6 (markdown 内容里通常是 h3+；完整支持以防结构变化)
            const allHeadings = blogContent.querySelectorAll('h1, h2, h3, h4, h5, h6');
            if (allHeadings.length === 0) {
                sidebar.style.display = 'none';
                return;
            }

            // 跳过与页面标题/日期相同的首个标题节点，避免重复
            //   1) h1 完全等于 .blog-title
            //   2) h2 (或任何层级) 起始为 YYYY-MM-DD 模式（博客的 "## 日期 标题" 行）
            //   3) h2 同时也以 "YYYY-MM-DD 标题" 形式等于 blog.date + ' ' + blog.title
            const blogTitleEl = document.querySelector('.blog-title');
            const blogTitle = blogTitleEl ? blogTitleEl.textContent.trim() : '';
            const dateHeadingRe = /^(\d{4}-\d{2}-\d{2})/;

            const headings = Array.from(allHeadings).filter((h, idx) => {
                const text = h.textContent.trim();
                if (h.tagName === 'H1' && blogTitle && text === blogTitle) return false;
                // 仅过滤第一个匹配的 h2：日期+标题行
                if (idx < 2 && h.tagName === 'H2' && dateHeadingRe.test(text)) return false;
                return true;
            });

            if (headings.length === 0) {
                sidebar.style.display = 'none';
                return;
            }

            const idMap = buildHeadingIdMap(headings);

            // 渲染目录
            const tocHTML = headings.map(h => {
                const level = h.tagName.toLowerCase();
                const indent = (parseInt(level.charAt(1), 10) - 1) * 0.65; // h1=0, h2=0.65, h3=1.3, ...
                return `<a href="#${h.id}" class="toc-item toc-${level}" data-target="${h.id}" style="--indent:${indent}rem;">
                    ${escapeHtml(h.textContent)}
                </a>`;
            }).join('');

            tocList.innerHTML = tocHTML;

            // 暴露给 scroll-spy
            window.__tocHeadings = headings;
            window.__tocLinks = Array.from(tocList.querySelectorAll('.toc-item'));

            setupTocScrollSpy();
            setupTocToggle();

            // 移动端点击目录项后自动关闭面板
            if (window.__tocLinks) {
                window.__tocLinks.forEach(link => {
                    link.addEventListener('click', () => {
                        if (window.innerWidth <= 900) {
                            closeMobileToc();
                        }
                    });
                });
            }
        }

        // 滚动联动：IntersectionObserver 高亮当前可见的标题
        let tocObserver = null;
        function setupTocScrollSpy() {
            if (tocObserver) tocObserver.disconnect();
            if (!('IntersectionObserver' in window)) return;
            const headings = window.__tocHeadings;
            const links = window.__tocLinks;
            if (!headings || !links || headings.length === 0) return;

            const setActive = (headingEl) => {
                links.forEach(a => a.classList.remove('active'));
                const activeLink = links.find(a => a.dataset.target === headingEl.id);
                if (activeLink) activeLink.classList.add('active');
            };

            // 跟踪所有 heading 的可见性；最靠近视口顶部的可见 heading 即为 active
            const visible = new Map();
            tocObserver = new IntersectionObserver((entries) => {
                entries.forEach(e => {
                    if (e.isIntersecting) {
                        visible.set(e.target, e.intersectionRatio);
                    } else {
                        visible.delete(e.target);
                    }
                });

                if (visible.size === 0) {
                    // 没有任何 heading 在视口中央区：
                    //   1) 滚到顶部 → 第一个
                    //   2) 接近底部 → 最后一个
                    //   3) 中间区段无 heading → 找到刚离开视口顶部的那个
                    if (window.scrollY < 100) {
                        setActive(headings[0]);
                    } else if (window.innerHeight + window.scrollY >= document.documentElement.scrollHeight - 50) {
                        setActive(headings[headings.length - 1]);
                    }
                    return;
                }

                // 选取最靠近视口顶部的可见 heading
                let active = null;
                let minTop = Infinity;
                visible.forEach((_, el) => {
                    const top = el.getBoundingClientRect().top;
                    if (top < minTop) {
                        minTop = top;
                        active = el;
                    }
                });
                if (active) setActive(active);
            }, {
                rootMargin: '-80px 0px -60% 0px',
                threshold: [0, 1]
            });

            headings.forEach(h => tocObserver.observe(h));

            // 初始化：默认高亮第一个
            setActive(headings[0]);
        }

        // 目录折叠 / 展开
        const TOC_COLLAPSE_KEY = 'qinblog_toc_collapsed';
        function setupTocToggle() {
            const toggle = document.getElementById('toc-toggle');
            const sidebar = document.getElementById('blog-sidebar');
            if (!toggle || !sidebar) return;

            // 恢复偏好

            toggle.addEventListener('click', () => {

        // ========== 新增功能：阅读进度条 ==========

        // 更新或创建 meta 标签
        function updateMetaTag(property, content) {
            let meta = document.querySelector('meta[property="' + property + '"]');

                meta.setAttribute('property', property);
                document.head.appendChild(meta);
            }

        function updateNameMetaTag(name, content) {

                meta = document.createElement('meta');
                meta.setAttribute('name', name);
                document.head.appendChild(meta);

            document.addEventListener('mousedown', (e) => {
                // 仅在详情页（存在 #blog-content）时拦截
                if (!document.getElementById('blog-content')) return;
                if (e.button === 3) {
                    e.preventDefault();
                    goBackFromDetail();
                }
            });
            // 阻止侧键在详情页触发系统默认行为（部分浏览器会当作 back）
            document.addEventListener('contextmenu', (e) => {
                if (e.button === 3 || e.button === 4) e.preventDefault();
            });
        }

        // 处理博客内容中的链接，确保在新窗口打开
        function setupBlogLinks() {
            const blogContent = document.getElementById('blog-content');
            if (!blogContent) return;

            const links = blogContent.querySelectorAll('a');

            links.forEach(link => {
                // 为所有外部链接添加 target="_blank" 和 rel 属性
                const href = link.getAttribute('href');

                // 判断是否为外部链接（不是站内锚点或相对路径）
                const isExternal = href && (
                    href.startsWith('http://') ||
                    href.startsWith('https://') ||
                    href.startsWith('//')
                );

                if (isExternal) {
                    link.setAttribute('target', '_blank');
                    link.setAttribute('rel', 'noopener noreferrer');
                    link.classList.add('external-link');

                    // 可选：添加外部链接图标
                    const icon = document.createElement('span');
                    icon.className = 'external-link-icon';
                    icon.innerHTML = ' ↗';
                    icon.style.fontSize = '0.75em';
                    icon.style.marginLeft = '0.25em';
                    icon.style.verticalAlign = 'super';

                    // 只在没有子元素时添加图标
                    if (!link.querySelector('svg') && !link.querySelector('img')) {
                        // 检查是否已有图标
                        if (!link.querySelector('.external-link-icon')) {
                            link.appendChild(icon);
                        }
                    }
                } else if (href && !href.startsWith('#') && !href.startsWith('mailto:') && !href.startsWith('tel:')) {
                    // 对于非锚点的内部链接，也建议在新窗口打开
                    link.setAttribute('target', '_blank');
                    link.setAttribute('rel', 'noopener');
                }
            });
        }

        // ========== 新增功能：代码块复制按钮 ==========
        function setupCodeCopyButtons() {
            const codeBlocks = document.querySelectorAll('pre');

            codeBlocks.forEach((block, index) => {
                const button = document.createElement('button');
                button.className = 'copy-code-btn';
                button.innerHTML = `
                    <svg class="icon" aria-hidden="true"><use href="#i-copy"></use></svg>
                    <span>复制</span>
                `;

                button.addEventListener('click', async () => {
                    const code = block.querySelector('code');
                    if (code) {
                        try {
                            await navigator.clipboard.writeText(code.textContent);
                            button.classList.add('copied');
                            button.innerHTML = `
                                <svg class="icon" aria-hidden="true"><use href="#i-check"></use></svg>
                                <span>已复制</span>
                            `;

                            setTimeout(() => {
                                button.innerHTML = `
                                    <svg class="icon" aria-hidden="true"><use href="#i-copy"></use></svg>
                                    <span>复制</span>
                                `;
                                button.classList.remove('copied');
                            }, 2000);
                        } catch (err) {
                            console.error('复制失败:', err);
                        }
                    }
                });

                block.style.position = 'relative';
                block.appendChild(button);
            });
        }

        // ========== 新增功能：图片懒加载和点击放大 ==========
        function setupImageLazyLoad() {
            const images = document.querySelectorAll('img');

            images.forEach(img => {
                // 添加点击放大功能
                img.style.cursor = 'pointer';
                img.addEventListener('click', () => {
                    const overlay = document.createElement('div');
                    overlay.className = 'image-overlay';
                    overlay.innerHTML = `
                        <div class="overlay-close" onclick="this.parentElement.remove()">×</div>
                        <img src="${img.src}" alt="${img.alt || ''}" style="max-width: 90vw; max-height: 90vh;">
                    `;
                    document.body.appendChild(overlay);
                });
            });
        }

        // ========== 新增功能：平滑滚动 ==========
        function setupSmoothScroll() {
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function (e) {
                    const href = this.getAttribute('href');
                    if (href !== '#' && href.length > 1) {
                        const target = document.querySelector(href);
                        if (target) {
                            e.preventDefault();
                            target.scrollIntoView({
                                behavior: 'smooth',
                                block: 'start'
                            });
                        }
                    }
                });
            });
        }

        // 获取当前主题
        function getCurrentTheme() {
            const bgColor = getComputedStyle(document.documentElement).getPropertyValue('--bg-primary').trim();
            return (bgColor.includes('#0C0A09') || bgColor.includes('#0c0a09')) ? 'dark' : 'light';
        }

        // 更新 Giscus 主题
        function updateGiscusTheme(theme) {
            const giscusFrame = document.querySelector('iframe.giscus-frame');
            if (giscusFrame && giscusFrame.contentWindow) {
                // 使用自定义 CSS 主题 URL，完全匹配博客配色
                const baseUrl = 'https://qinindexcode.site/css/giscus-';
                const themeUrl = theme === 'dark' ? baseUrl + 'dark.css' : baseUrl + 'light.css';
                giscusFrame.contentWindow.postMessage({
                    giscus: {
                        setConfig: {
                            theme: themeUrl
                        }
                    }
                }, 'https://giscus.app');
                console.log(`🎨 Giscus 主题已切换为: ${themeUrl}`);
            }
        }
