<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="QinIndexCode - 技术博客，分享 JavaScript、前端开发、后端开发等技术文章">
    <meta name="keywords" content="技术博客，JavaScript, 前端开发，后端开发，React, Vue, Node.js">
    <title>随记 - 个人技术博客</title>
    <link href="./css/css2.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/atom-one-dark.min.css">
    <link href="./css/main.css" rel="stylesheet">
    <script src="./js/smooth-scroll.js" defer></script>
    <!-- 如果用户直接访问此页面，自动重定向到 index.html -->
    <script src="./js/redirect-if-standalone.js"></script>
</head>

<body>
    <div class="container" id="container">
        <h1 class="section-title">随记</h1>

        <!-- 博客列表 -->
        <div class="grid grid-2" id="blog-list">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <!-- 引入 markdown 解析库 -->
    <script src="./js/markdown-it.min.js"></script>
    <script src="./js/highlight.min.js"></script>
    <script>
        const md = window.markdownit({
            html: true,
            linkify: true,
            typographer: true,
            highlight: function (str, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    try {
                        return '<pre class="hljs"><code>' +
                            hljs.highlight(str, { language: lang, ignoreIllegals: true }).value +
                            '</code></pre>';
                    } catch (__) { }
                }
                return '<pre class="hljs"><code>' + md.utils.escapeHtml(str) + '</code></pre>';
            }
        });

        let blogData = [];

        // 点赞数据存储（使用 localStorage 缓存）
        const likeStorage = {
            getKey: (id) => `blog_like_${id}`,
            hasLiked: (id) => localStorage.getItem(likeStorage.getKey(id)) === 'true',
            setLiked: (id, liked) => localStorage.setItem(likeStorage.getKey(id), liked.toString()),
            getCount: (id) => {
                const data = localStorage.getItem(`blog_like_count_${id}`);
                return data ? parseInt(data, 10) : 0;
            },
            setCount: (id, count) => localStorage.setItem(`blog_like_count_${id}`, count.toString())
        };

        document.addEventListener('DOMContentLoaded', () => {
            loadBlogsSequentially();
        });

        async function loadBlogsSequentially() {
            const blogListElement = document.getElementById('blog-list');
            blogListElement.innerHTML = '<div class="loading">加载中...</div>';

            const loadedBlogs = [];
            let index = 1;

            while (true) {
                const fileName = `${index.toString().padStart(3, '0')}.md`;
                const filePath = `./blogs/${fileName}`;

                try {
                    const response = await fetch(filePath, { method: 'HEAD' });
                    if (!response.ok) break;

                    const contentResponse = await fetch(filePath);
                    if (!contentResponse.ok) break;

                    const content = await contentResponse.text();
                    const blog = parseBlogContent(fileName, content);
                    loadedBlogs.push(blog);

                } catch (error) {
                    console.warn(`停止加载：${filePath} 不存在或无法访问`);
                    break;
                }

                index++;
            }

            if (loadedBlogs.length === 0) {
                blogListElement.innerHTML = '<div class="empty-state">暂无博客文章</div>';
                return;
            }

            blogData = loadedBlogs.sort((a, b) => b.seq - a.seq);
            renderBlogList();
        }

        function parseBlogContent(fileName, content) {
            const seq = parseInt(fileName.replace('.md', ''), 10);

            let title = '未命名博客';
            let date = '未知日期';

            const firstLineMatch = content.match(/^##\s+(\d{4}-\d{2}-\d{2})\s+(.*)$/m);
            if (firstLineMatch) {
                date = firstLineMatch[1].trim();
                title = firstLineMatch[2].trim();
            }

            let plainText = content
                .replace(/^##.*$/gm, '')
                .replace(/```[\s\S]*?```/g, '')
                .replace(/!\[.*?\]\(.*?\)/g, '')
                .replace(/\n/g, ' ')
                .trim();

            const excerpt = plainText.length > 150
                ? plainText.substring(0, 150) + '...'
                : plainText || '暂无摘要';

            return {
                id: fileName.replace('.md', ''),
                fileName: fileName,
                seq: seq,
                title: title,
                date: date,
                author: 'QinIndexCode',
                excerpt: excerpt,
                content: content
            };
        }

        // 点赞功能实现
        async function loadLikeCount(blogId) {
            const countEl = document.getElementById('like-count');
            const btn = document.getElementById('like-btn');

            // 从 localStorage 加载缓存数据
            const cachedCount = likeStorage.getCount(blogId);
            const hasLiked = likeStorage.hasLiked(blogId);

            if (cachedCount > 0) {
                countEl.textContent = cachedCount;
            }

            if (hasLiked) {
                btn.classList.add('liked');
            }

            // 尝试从 GitHub API 获取真实数据（如果有）
            try {
                // 这里可以扩展为调用 GitHub API 获取 reactions
                // 目前使用 localStorage 作为主要存储
            } catch (error) {
                console.warn('Failed to load likes from GitHub:', error);
            }
        }

        async function toggleLike(blogId) {
            const btn = document.getElementById('like-btn');
            const countEl = document.getElementById('like-count');
            const hasLiked = likeStorage.hasLiked(blogId);

            // 检查是否已登录 GitHub（可选）
            // 这里简单实现，使用 localStorage

            if (hasLiked) {
                // 取消点赞
                likeStorage.setLiked(blogId, false);
                const currentCount = likeStorage.getCount(blogId);
                likeStorage.setCount(blogId, Math.max(0, currentCount - 1));
                btn.classList.remove('liked');
            } else {
                // 添加点赞
                likeStorage.setLiked(blogId, true);
                const currentCount = likeStorage.getCount(blogId);
                likeStorage.setCount(blogId, currentCount + 1);
                btn.classList.add('liked');

                // 小动画反馈
                btn.style.transform = 'scale(1.2)';
                setTimeout(() => {
                    btn.style.transform = '';
                }, 200);
            }

            // 更新显示
            countEl.textContent = likeStorage.getCount(blogId);
        }

        // 渲染博客列表
        function renderBlogList() {
            const container = document.getElementById('container');
            container.classList.add('fade-out');

            setTimeout(() => {
                container.innerHTML = `
                <h1 class="section-title">随记</h1>
                <div class="grid grid-2" id="blog-list"></div>
            `;

                const blogList = document.getElementById('blog-list');
                const blogCardsHTML = blogData.map(blog =>
                    `<div class="card" onclick="openBlog('${blog.id}')" style="cursor: pointer;">
                    <h3>${blog.title}</h3>
                    <div style="color: var(--text-muted); font-size: 0.875rem; margin-bottom: 1rem;">
                        <span style="margin-right: 1rem;">${blog.date}</span>
                        <span>${blog.author}</span>
                    </div>
                    <p style="flex: 1; margin-bottom: 1.5rem;">${blog.excerpt}</p>
                    <span class="link-arrow">阅读更多</span>
                </div>`
                ).join('');

                blogList.innerHTML = blogCardsHTML;

                container.classList.remove('fade-out');
                container.classList.add('fade-in');
                setTimeout(() => container.classList.remove('fade-in'), 300);
            }, 300);
        }

        function openBlog(blogId) {
            const blog = blogData.find(b => b.id === blogId);
            if (!blog) return;

            const htmlContent = md.render(blog.content);

            // 生成唯一的讨论 ID（使用博客 ID）
            const discussionId = blogId;
            const discussionTitle = blog.title;

            const container = document.getElementById('container');
            container.classList.add('fade-out');

            setTimeout(() => {
                container.innerHTML = `
                <button class="back-link" onclick="renderBlogList()">
                    <span class="arrow">←</span> 返回列表
                </button>
                <div class="card blog-detail-card">
                    <!-- 博客头部信息 -->
                    <div class="blog-header">
                        <h1 class="blog-title">${blog.title}</h1>
                        <div class="blog-meta">
                            <span class="blog-date">📅 ${blog.date}</span>
                            <span class="blog-author">✍️ ${blog.author}</span>
                        </div>
                    </div>
                    
                    <!-- 点赞和互动栏 -->
                    <div class="blog-interactions">
                        <button class="like-btn" id="like-btn" onclick="toggleLike('${discussionId}')" aria-label="点赞文章">
                            <svg class="like-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                            </svg>
                            <span class="like-count" id="like-count">0</span>
                            <span class="like-text">点赞</span>
                        </button>
                        <div class="interaction-divider"></div>
                        <a href="#comments-section" class="comment-link">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                            </svg>
                            <span>评论</span>
                        </a>
                    </div>
                    
                    <!-- 博客正文 -->
                    <div class="blog-content">
                        ${htmlContent}
                    </div>
                    
                    <!-- 标签区域 -->
                    <div class="blog-tags">
                        <span class="tag">#AI</span>
                        <span class="tag">#技术思考</span>
                    </div>
                </div>
                
                <!-- Giscus 评论区域 -->
                <div class="card comments-card" id="comments-section">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                        <h2>💬 评论讨论</h2>
                        <a href="../index.html" target="_top" class="back-to-main">
                            <span class="arrow">←</span> 返回主站
                        </a>
                    </div>
                    <div class="giscus" id="giscus-container"></div>
                </div>`;

                container.classList.remove('fade-out');
                container.classList.add('fade-in');

                // 加载点赞数据
                loadLikeCount(discussionId);

                // 动态加载 Giscus
                loadGiscus(discussionId);

                // 监听主题变化
                const observer = new MutationObserver(() => {
                    const giscusFrame = document.querySelector('iframe.giscus-frame');
                    if (giscusFrame && window.getCurrentTheme) {
                        const isDark = !window.getCurrentTheme()['--bg-primary'].includes('#F1F5F9');
                        giscusFrame.contentWindow.postMessage({
                            giscus: {
                                setConfig: {
                                    theme: isDark ? 'dark' : 'light'
                                }
                            }
                        }, 'https://giscus.app');
                    }
                });
                observer.observe(document.body, { attributes: true, attributeFilter: ['style'] });

                setTimeout(() => container.classList.remove('fade-in'), 300);
            }, 300);
        }

        // 动态加载 Giscus 评论系统
        let giscusRetryCount = 0;
        const maxGiscusRetries = 3;

        function loadGiscus(discussionId) {
            // 检查是否已存在
            const existing = document.querySelector('script[src*="giscus.app"]');
            if (existing) {
                existing.remove();
            }

            // 同时移除可能存在的 iframe
            const existingFrame = document.querySelector('iframe.giscus-frame');
            if (existingFrame) {
                existingFrame.remove();
            }

            // 构建回调 URL - 使用统一的 auth-callback.html 处理 OAuth 回调
            const backLink = `${window.location.origin}/auth-callback.html?redirect=${encodeURIComponent(window.location.href)}`;

            // 检测当前主题
            const isDark = document.body.classList.contains('dark-theme') || 
                          getComputedStyle(document.documentElement).getPropertyValue('--bg-primary').includes('#0B0C15');
            const theme = isDark ? 'dark' : 'light';

            const script = document.createElement('script');
            script.src = 'https://giscus.app/client.js';
            script.async = true;
            script.crossOrigin = 'anonymous';
            script.setAttribute('data-repo', 'QinIndexCode/QinIndexCode');
            script.setAttribute('data-repo-id', 'R_kgDOQmJfZg');
            script.setAttribute('data-category', 'General');
            script.setAttribute('data-category-id', 'DIC_kwDOQmJfZs4C3dZh');
            script.setAttribute('data-mapping', 'specific');
            script.setAttribute('data-term', discussionId);
            script.setAttribute('data-strict', '0');
            script.setAttribute('data-reactions-enabled', '1');
            script.setAttribute('data-emit-metadata', '0');
            script.setAttribute('data-input-position', 'top');
            // 使用检测到的主题，而不是跟随系统
            script.setAttribute('data-theme', theme);
            script.setAttribute('data-lang', 'zh-CN');
            // 设置回调链接，让 OAuth 后返回到统一的处理页面
            script.setAttribute('data-backlink', backLink);
            // 移除 lazy loading，确保立即加载
            // script.setAttribute('data-loading', 'lazy');

            // 错误处理 - 带重试机制
            script.addEventListener('error', () => {
                console.error(`Giscus 脚本加载失败 (尝试 ${giscusRetryCount + 1}/${maxGiscusRetries})`);
                
                if (giscusRetryCount < maxGiscusRetries) {
                    giscusRetryCount++;
                    console.log(`正在重试加载 Giscus...`);
                    setTimeout(() => loadGiscus(discussionId), 2000);
                } else {
                    console.error('Giscus 加载失败，已达到最大重试次数');
                    showGiscusError();
                }
            });

            // 成功加载后重置重试计数
            script.addEventListener('load', () => {
                giscusRetryCount = 0;
                console.log('Giscus 加载成功');
            });

            document.body.appendChild(script);

            // 监听主题变化，动态切换 Giscus 主题
            setupGiscusThemeListener();
        }

        // 显示 Giscus 错误界面
        function showGiscusError() {
            const container = document.getElementById('giscus-container');
            if (container) {
                container.innerHTML = `
                    <div style="padding: 2rem; text-align: center; color: var(--text-muted);">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-bottom: 1rem; opacity: 0.5;">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="12" y1="8" x2="12" y2="12"/>
                            <line x1="12" y1="16" x2="12.01" y2="16"/>
                        </svg>
                        <h3 style="color: var(--text-primary); margin-bottom: 0.5rem;">评论系统暂时不可用</h3>
                        <p style="margin-bottom: 1.5rem;">可能是网络连接问题或 Giscus 服务暂时不可用。</p>
                        <div style="display: flex; gap: 1rem; justify-content: center;">
                            <button onclick="giscusRetryCount=0; loadGiscus('${discussionId}');" style="padding: 0.5rem 1rem; background: var(--accent-blue); color: white; border: none; border-radius: 8px; cursor: pointer;">
                                重新加载
                            </button>
                            <a href="https://github.com/QinIndexCode/QinIndexCode/discussions" target="_blank" style="padding: 0.5rem 1rem; background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-primary); text-decoration: none; border-radius: 8px;">
                                在 GitHub 上讨论
                            </a>
                        </div>
                    </div>
                `;
            }
        }

        // 设置 Giscus 主题监听器
        function setupGiscusThemeListener() {
            let lastTheme = getCurrentTheme();
            
            // 方法1: 监听父窗口的隐藏输入框变化（最可靠）
            if (window.parent !== window) {
                const parentInput = window.parent.document.getElementById('theme-state');
                if (parentInput) {
                    // 初始同步
                    const parentTheme = parentInput.value;
                    if (parentTheme !== lastTheme) {
                        lastTheme = parentTheme;
                        updateGiscusTheme(parentTheme);
                    }
                    
                    // 监听输入框变化
                    const inputObserver = new MutationObserver((mutations) => {
                        mutations.forEach((mutation) => {
                            if (mutation.type === 'attributes' && mutation.attributeName === 'value') {
                                const newTheme = parentInput.value;
                                if (newTheme !== lastTheme) {
                                    lastTheme = newTheme;
                                    updateGiscusTheme(newTheme);
                                }
                            }
                        });
                    });
                    inputObserver.observe(parentInput, { attributes: true });
                }
                
                // 方法2: 监听父窗口的自定义事件
                window.parent.addEventListener('themeChanged', (e) => {
                    const newTheme = e.detail.theme;
                    if (newTheme !== lastTheme) {
                        lastTheme = newTheme;
                        updateGiscusTheme(newTheme);
                    }
                });
            }
            
            // 方法3: 监听本地 CSS 变量变化（作为后备）
            const styleObserver = new MutationObserver((mutations) => {
                mutations.forEach((mutation) => {
                    if (mutation.type === 'attributes' && mutation.attributeName === 'style') {
                        const currentTheme = getCurrentTheme();
                        if (currentTheme !== lastTheme) {
                            lastTheme = currentTheme;
                            updateGiscusTheme(currentTheme);
                        }
                    }
                });
            });
            styleObserver.observe(document.documentElement, { attributes: true });

            // 方法4: 超快速轮询检查（50ms，仅前3秒）
            let fastCheckInterval = null;
            let isPageVisible = !document.hidden;
            
            // 页面可见性变化时暂停/恢复轮询
            document.addEventListener('visibilitychange', () => {
                isPageVisible = !document.hidden;
            });
            
            fastCheckInterval = setInterval(() => {
                // 页面不可见时跳过检查，节省资源
                if (!isPageVisible) return;
                
                const currentTheme = getCurrentTheme();
                if (currentTheme !== lastTheme) {
                    lastTheme = currentTheme;
                    updateGiscusTheme(currentTheme);
                }
            }, 50);

            // 3秒后停止快速轮询
            setTimeout(() => {
                if (fastCheckInterval) {
                    clearInterval(fastCheckInterval);
                    fastCheckInterval = null;
                }
            }, 3000);
        }

        // 获取当前主题
        function getCurrentTheme() {
            const bgColor = getComputedStyle(document.documentElement).getPropertyValue('--bg-primary').trim();
            return (bgColor.includes('#0B0C15') || bgColor.includes('#0b0c15')) ? 'dark' : 'light';
        }

        // 更新 Giscus 主题
        function updateGiscusTheme(theme) {
            const giscusFrame = document.querySelector('iframe.giscus-frame');
            if (giscusFrame && giscusFrame.contentWindow) {
                giscusFrame.contentWindow.postMessage({
                    giscus: {
                        setConfig: {
                            theme: theme
                        }
                    }
                }, 'https://giscus.app');
                console.log(`🎨 Giscus 主题已切换为: ${theme}`);
            }
        }
    </script>

            background: var(--glass-bg-hover);
            border-radius: var(--border-radius);
        }

        .blog-content {
            margin-bottom: 2rem;
        }

        .blog-tags {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            padding-top: 1.5rem;
            border-top: 1px solid var(--glass-border);
        }

        .comments-card {
            margin-top: 2rem;
        }

        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--glass-border);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to {

            }
        }

        #giscus-container {
            margin-top: 1rem;
        }

        #giscus-container iframe {

        .back-to-main {
            display: inline-flex;
            align-items: center;

            padding: 0.5rem 1rem;
            background: var(--glass-bg);

            border-radius: var(--border-radius);
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.875rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);

        .back-to-main:hover {
            background: var(--glass-bg-hover);
            border-color: var(--accent-blue);
            transform: translateX(-4px);
        }

        .back-to-main .arrow {
            font-family: system-ui;
        }
