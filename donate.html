<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="支持 QinIndexCode - 请我喝杯咖啡，支持开源项目持续发展">
    <title>捐赠 - QinIndexCode</title>

    <meta property="og:title" content="支持作者 - QinIndexCode">
    <meta property="og:description" content="如果我的内容对你有帮助，欢迎请我喝杯咖啡">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://qinindexcode.site/donate.html">
    <meta property="og:image" content="https://qinindexcode.site/assets/images/avatar.jpg">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="支持作者 - QinIndexCode">
    <meta name="twitter:description" content="如果我的内容对你有帮助，欢迎请我喝杯咖啡">

    <link rel="canonical" href="https://qinindexcode.site/donate.html">

    <meta name="agent:page-type" content="donate">
    <meta name="agent:content-language" content="zh-CN">
    <meta name="agent:features" content="donation">

    <link href="./css/css2.css" rel="stylesheet">
    <link href="./css/main.min.css" rel="stylesheet">
    <script src="./js/theme-tokens.js"></script>
    <script src="./js/redirect-if-standalone.js" defer></script>
    <script src="./js/nav-loader.js" defer></script>
    <script src="./js/theme-listener.js" defer></script>
    <script src="./js/perf-detect.js"></script>
    <script src="./js/ui-controls.js" defer></script>
</head>
<body>
<noscript>
    <div style="padding:2rem;max-width:800px;margin:0 auto;font-family:system-ui,sans-serif;">
        <h1>支持与捐赠 - QinIndexCode</h1>
        <p>如果你觉得我的内容对你有帮助，欢迎请我喝杯咖啡支持一下</p>
    </div>
</noscript>

    <main class="donate-wrapper" role="main">
        <div class="bg-glow" aria-hidden="true"></div>

        <article class="card donate-card glass glow-border">
            <div class="kofi-logo-wrapper">
                <picture>
                    <source srcset="assets/images/ko-fi.webp" type="image/webp">
                    <img src="assets/images/ko-fi.png" alt="Ko-fi" class="kofi-logo" loading="lazy" decoding="async" width="48" height="48">
                </picture>
            </div>

            <h1 class="donate-title">请我喝杯咖啡</h1>
            <p class="donate-desc">
                如果您觉得我的文章或开源项目对您有所帮助，<br>
                欢迎通过 Ko-fi 进行捐赠支持。您的鼓励是我持续创作的最大动力！
            </p>

            <a href="https://ko-fi.com/qinindexcode" target="_blank" rel="noopener noreferrer"
               class="btn-payment btn-kofi" aria-label="前往 Ko-fi 捐赠页面">
                <svg class="icon icon-filled animate-beat" aria-hidden="true"><use href="#i-coffee"></use></svg>
                <span>前往 Ko-fi 捐赠</span>
            </a>

            <div class="divider" role="separator">
                <span>或使用扫码支付</span>
            </div>

            <div class="payment-grid">
                <button class="btn-payment btn-wechat" onclick="showQR('wechat')" aria-label="显示微信支付二维码">
                    <svg class="icon icon-filled" aria-hidden="true"><use href="#i-wechat"></use></svg>
                    <span>微信支付</span>
                </button>

                <button class="btn-payment btn-alipay" onclick="showQR('alipay')" aria-label="显示支付宝二维码">
                    <svg class="icon icon-filled" aria-hidden="true"><use href="#i-alipay"></use></svg>
                    <span>支付宝</span>
                </button>
            </div>
        </article>
    </main>

    <!-- QR Code Modal -->
    <div class="qr-modal" id="qrModal" onclick="closeQR(event)" role="dialog" aria-modal="true" aria-labelledby="qrTitle" aria-describedby="qrDesc">
        <div class="qr-modal-content" role="document">
            <button class="qr-close-btn" onclick="closeQR(event, true)" aria-label="关闭二维码">
                <svg class="icon" aria-hidden="true"><use href="#i-x"></use></svg>
            </button>
            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'/%3E" alt="支付二维码" class="qr-modal-img" id="qrImage">
            <div class="qr-modal-title" id="qrTitle">支付方式</div>
            <div class="qr-modal-tip" id="qrDesc">感谢您的支持！</div>
        </div>
    </div>

    <script src="./js/donate.js" defer></script>
<script src="./js/svg-sprite.js"></script>
</body>
</html>
