<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="支持 QinIndexCode - 请我喝杯咖啡，支持开源项目持续发展">
    <title>捐赠 - QinIndexCode</title>

    <meta property="og:title" content="支持作者 - QinIndexCode">
    <meta property="og:description" content="如果我的内容对你有帮助，欢迎请我喝杯咖啡">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://qinindexcode.site/donate.html">
    <meta property="og:image" content="https://qinindexcode.site/assets/images/avatar.webp">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="支持作者 - QinIndexCode">
    <meta name="twitter:description" content="如果我的内容对你有帮助，欢迎请我喝杯咖啡">

    <link rel="canonical" href="https://qinindexcode.site/donate.html">

    <meta name="agent:page-type" content="donate">
    <meta name="agent:content-language" content="zh-CN">
    <meta name="agent:features" content="donation">

    <link href="./css/css2.css" rel="stylesheet">
    <link href="./css/main.min.css" rel="stylesheet">
    <link href="./css/donate.css?v=3" rel="stylesheet">
    <script src="./js/theme-tokens.js"></script>
    <script src="./js/redirect-if-standalone.js" defer></script>
    <script src="./js/nav-loader.js" defer></script>
    <script src="./js/theme-listener.js" defer></script>
    <script src="./js/perf-detect.js"></script>
    <script src="./js/ui-controls.js" defer></script>
</head>
<body>
<noscript>
    <div style="padding:2rem;max-width:800px;margin:0 auto;font-family:system-ui,sans-serif;">
        <h1>支持与捐赠 - QinIndexCode</h1>
        <p>如果你觉得我的内容对你有帮助，欢迎请我喝杯咖啡支持一下</p>
    </div>
</noscript>

    <main class="container" role="main">
        <!-- Hero -->
        <section class="donate-hero">
            <div class="donate-hero-content">
                <p class="eyebrow">Support</p>
                <h1>感谢你的关注</h1>
                <p class="donate-hero-desc">
                    如果你喜欢我的文章或开源项目，任何形式的支持都是对我最大的鼓励。每一份支持都让持续创作更有动力。
                </p>
                <div class="donate-hero-cta-row">
                    <button onclick="openPayModal()" class="btn-donate-primary" aria-label="查看捐赠方式">
                        <svg class="icon icon-filled" aria-hidden="true"><use href="#i-heart"></use></svg>
                        <span>支持作者</span>
                        <svg class="icon" aria-hidden="true"><use href="#i-arrow-right"></use></svg>
                    </button>
                    <div class="donate-avatar-inline glass glow-border">
                        <picture>
                            <source srcset="assets/images/avatar.webp" type="image/webp">
                            <img src="assets/images/avatar.webp" alt="" loading="lazy" width="44" height="44">
                        </picture>
                    </div>
                </div>
            </div>
        </section>

        <!-- 支持会用于 -->
        <section class="card glass donate-section">
            <div class="donate-usage-grid">
                <div class="donate-usage-item">
                    <svg class="icon donate-usage-icon" aria-hidden="true"><use href="#i-server"></use></svg>
                    <span class="donate-usage-title">服务器与域名</span>
                    <span class="donate-usage-desc">保持站点稳定运行</span>
                </div>
                <div class="donate-usage-item">
                    <svg class="icon donate-usage-icon" aria-hidden="true"><use href="#i-book-open"></use></svg>
                    <span class="donate-usage-title">内容创作</span>
                    <span class="donate-usage-desc">持续输出技术文章</span>
                </div>
                <div class="donate-usage-item">
                    <svg class="icon donate-usage-icon" aria-hidden="true"><use href="#i-git-branch"></use></svg>
                    <span class="donate-usage-title">开源项目</span>
                    <span class="donate-usage-desc">维护和开发新工具</span>
                </div>
            </div>
        </section>

        <!-- 支持者 -->
        <section class="card glass donor-section is-hidden" id="donor-section">
            <p class="donor-label">支持者</p>
            <ol class="donor-list" id="donor-list"></ol>
        </section>
    </main>

    <!-- Payment Modal -->
    <div class="pay-modal" id="payModal" onclick="closePayModal(event)" role="dialog" aria-modal="true" aria-labelledby="payModalTitle">
        <div class="pay-modal-content" role="document">
            <p class="pay-modal-title" id="payModalTitle">选择捐赠方式</p>

            <a href="https://ko-fi.com/qinindexcode" target="_blank" rel="noopener noreferrer" class="pay-option pay-option-kofi">
                <svg class="icon icon-filled" aria-hidden="true"><use href="#i-coffee"></use></svg>
                <span>前往 Ko-fi 捐赠</span>
            </a>

            <div class="pay-divider"><span>国内支付</span></div>

            <div class="pay-grid">
                <button class="pay-option pay-option-wechat" onclick="showQR('wechat')" aria-label="微信支付">
                    <svg class="icon icon-filled" aria-hidden="true"><use href="#i-wechat"></use></svg>
                    <span>微信支付</span>
                </button>
                <button class="pay-option pay-option-alipay" onclick="showQR('alipay')" aria-label="支付宝">
                    <svg class="icon icon-filled" aria-hidden="true"><use href="#i-alipay"></use></svg>
                    <span>支付宝</span>
                </button>
            </div>
        </div>
    </div>

    <!-- QR Sub-modal -->
    <div class="qr-submodal" id="qrSubmodal" onclick="closeQRSub(event)" role="dialog" aria-modal="true" aria-labelledby="qrSubTitle">
        <div class="qr-sub-content" role="document">
            <div class="qr-sub-img" id="qrSubImg" role="img" aria-label="支付二维码"></div>
            <p class="qr-sub-title" id="qrSubTitle">支付方式</p>
            <p class="qr-sub-tip">感谢您的支持！</p>
        </div>
    </div>

    <script src="./js/donate.js" defer></script>
<script src="./js/svg-sprite.js"></script>
</body>
</html>
